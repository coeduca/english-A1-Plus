        {
          type: 'note',
          html: '<h3>Wh- Questions with Simple Past</h3><p>We use <b>Wh- words</b> (What, Where, When, Why, Who, How) to ask for specific information. In the <b>simple past</b>, we use the auxiliary <b>did</b> + subject + base verb.</p><p><b>Structure:</b> Wh- + did + subject + base verb + ...?</p><ul><li><b>What</b> did you eat yesterday? → I ate pizza.</li><li><b>Where</b> did she go last weekend? → She went to the beach.</li><li><b>When</b> did they arrive? → They arrived at 8 p.m.</li><li><b>Why</b> did he cry? → Because he was sad.</li><li><b>Who</b> did you meet? → I met my cousin.</li><li><b>How</b> did you travel? → I traveled by bus.</li></ul><p><b>Note:</b> With the verb <i>to be</i>, we do NOT use <i>did</i>. Use <b>was/were</b> instead. Example: <i>Where were you yesterday?</i></p>'

          type: 'multiplechoice',

            { q: '___ did he call yesterday? — He called his mother.', options: ['Who', 'Where', 'What'], answer: 0 },

            { q: '___ did the party finish? — It finished at midnight.', options: ['Where', 'When', 'Who'], answer: 1 }

            { q: '___ did your sister study last night? — She studied math.', options: ['Where', 'What', 'How'], answer: 1 },
            { q: '___ did you visit your grandparents? — Last Sunday.', options: ['When', 'Why', 'Who'], answer: 0 },

            { q: '___ did you feel sad? — Because I lost my keys.', options: ['How', 'When', 'Why'], answer: 2 },
            { q: '___ did Mark park the car? — In front of the house.', options: ['Where', 'What', 'Who'], answer: 0 },
            { q: '___ did you cook the chicken? — I cooked it in the oven.', options: ['Why', 'How', 'When'], answer: 1 },
            { q: '___ did you do last weekend? — I went hiking.', options: ['Who', 'What', 'Where'], answer: 1 },
            { q: '___ did the teacher arrive? — She arrived at 8:00.', options: ['When', 'Why', 'How'], answer: 0 }
          ]
        },
        {
          type: 'matchlines',
          title: 'Match the question with its answer',
          instruction: 'Look at the images for clues. Match each Wh- question with the correct past-tense answer.',
          image: 'files/woman-thinking.avif',
          dataA: [
            { left: 'What did the boy do?', right: 'He washed the dishes.' },
            { left: 'Where did the man work?', right: 'He worked in an office.' },

        {
          type: 'spoterror',

          dataA: [
            { words: ['What', 'did', 'you', 'ate', 'yesterday', '?'], errorIndex: 3, fix: 'eat' },
            { words: ['Where', 'you', 'did', 'go', 'last', 'night', '?'], errorIndex: 1, fix: 'did' },

            { words: ['When', 'did', 'they', 'arrives', 'home', '?'], errorIndex: 3, fix: 'arrive' },
            { words: ['Who', 'do', 'you', 'meet', 'last', 'week', '?'], errorIndex: 1, fix: 'did' },
            { words: ['How', 'did', 'she', 'learns', 'French', '?'], errorIndex: 3, fix: 'learn' },
            { words: ['What', 'did', 'your', 'sister', 'bought', '?'], errorIndex: 4, fix: 'buy' }
          ],
          dataB: [
            { words: ['Where', 'did', 'you', 'went', 'on', 'vacation', '?'], errorIndex: 3, fix: 'go' },
            { words: ['What', 'she', 'did', 'do', 'on', 'Sunday', '?'], errorIndex: 1, fix: 'did' },
            { words: ['When', 'did', 'the', 'class', 'started', '?'], errorIndex: 4, fix: 'start' },

          dataA: {
